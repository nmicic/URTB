# urtb-listen.conf — Compartment profile for urtb listen (server side)
#
# Threat model: a hostile client — rogue radio device (ESP-NOW/LoRa),
# compromised laptop, or attacker who obtained a capsule — connects to
# your listener. They could send crafted frames exploiting parser bugs
# in the frame decoder, fragmentation engine, or AEAD layer to achieve
# code execution inside the urtb process on your server.
#
# This profile restricts the urtb listen process: block dangerous
# syscalls, strip credentials from the environment, and prevent
# privilege escalation. The spawned shell remains functional ($HOME
# is read-write) because that's the purpose of the listener.
#
# Mode: deny-list (blocks dangerous syscalls urtb doesn't need).
# Safe default — won't break on rare code paths or shell commands.
#
# Usage:
#   compartment-user --profile compartment/urtb-listen.conf -- \
#       urtb listen --transport unix --socket /tmp/urtb.sock \
#           --capsule cap.cap --loop
#
#   # With OTP:
#   compartment-user --profile compartment/urtb-listen.conf -- \
#       urtb listen --transport unix --socket /tmp/urtb.sock \
#           --capsule cap.cap --loop --otp otp.key
#
#   # Stdio transport (jump host):
#   compartment-user --profile compartment/urtb-listen.conf -- \
#       urtb listen --transport stdio --capsule cap.cap
#
# For strict (allow-list) mode, use urtb-listen-strict.conf instead.

# ── Filesystem ──
# System libs: read-only
ro /usr
ro /lib
ro /lib64
ro /etc
ro /run
ro /proc
ro /sys

# PTY devices: read-write (forkpty needs /dev/ptmx, /dev/pts/*)
rw /dev

# $HOME: read-write + execute — the spawned shell needs to write files
# AND execute binaries (urtb itself, shell scripts, tools).
# This is the key difference from urtb-connect.conf (where $HOME is ro).
# Compartment enforces W^X: 'rw' alone blocks execute. 'rwx' allows both.
rwx $HOME

# /tmp: read-write (UNIX sockets, shell temp files)
rw /tmp

# ── Syscalls: block everything dangerous that urtb doesn't use ──
# Profiled with: syscall.py profile -- urtb listen --transport stdio
# Also profiled with OTP (--otp): same syscalls, TOTP uses vDSO.
# Result: 0 dangerous syscalls needed out of 50 checked.
block ptrace
block mount
block umount2
block reboot
block kexec_load
block kexec_file_load
block init_module
block finit_module
block delete_module
block pivot_root
block chroot
block unshare
block setns
block keyctl
block add_key
block request_key
block bpf
block userfaultfd
block perf_event_open
block process_vm_readv
block process_vm_writev
block acct
block swapon
block swapoff
block settimeofday
block clock_settime
block clock_adjtime
block adjtimex
block io_uring_setup
block io_uring_enter
block io_uring_register
block open_by_handle_at
block name_to_handle_at
block open_tree
block move_mount
block fsopen
block fsmount
block fsconfig
block fspick
block mount_setattr
block pidfd_getfd
block ioperm
block iopl
block nfsservctl
block quotactl
block personality
block lookup_dcookie
block mbind
block move_pages
block vhangup

# ── Environment: strip injection vectors and credential leakage ──
# Note: URTB_PASSPHRASE is intentionally NOT stripped — urtb needs it.
env-deny LD_PRELOAD
env-deny LD_LIBRARY_PATH
env-deny LD_AUDIT
env-deny GCONV_PATH
env-deny BASH_ENV
env-deny NODE_OPTIONS
env-deny AWS_ACCESS_KEY_ID
env-deny AWS_SECRET_ACCESS_KEY
env-deny AWS_SESSION_TOKEN
env-deny GITHUB_TOKEN
env-deny GH_TOKEN
env-deny DATABASE_URL
env-deny PGPASSWORD
env-deny MYSQL_PWD

# ── Features ──
landlock on
seccomp on
no-new-privs on
env-sanitize on
