# urtb-connect.conf — Compartment profile for urtb connect (client side)
#
# Threat model: urtb receives data from untrusted sources — radio
# peers (ESP-NOW/LoRa within range), jump hosts, or remote servers.
# Any of these could send crafted frames, malicious escape sequences,
# or exploit urtb parser bugs to achieve code execution on your laptop.
#
# This profile restricts what the urtb connect process can do on YOUR
# machine — filesystem access, dangerous syscalls, and environment
# leakage — so even if the remote side is hostile, the blast radius
# on the client is limited.
#
# Mode: deny-list (blocks dangerous syscalls urtb doesn't need).
# Safe default — won't break on rare code paths.
#
# Usage:
#   compartment-user --profile compartment/urtb-connect.conf -- \
#       urtb connect --exec "ssh jump ssh server urtb listen --transport stdio \
#           --capsule /path/cap" --capsule cap.cap
#
# For strict (allow-list) mode, use urtb-connect-strict.conf instead.

# ── Filesystem ──
# Minimal: urtb connect only needs to read the capsule + system libs.
# It does not write files — session output goes to the terminal (fd).
ro /usr
ro /lib
ro /lib64
ro /etc
ro /run
ro /proc
ro /sys

# PTY devices (urtb needs /dev/ptmx, /dev/pts/* for the local terminal)
rw /dev

# Capsule is read-only. Override path with --ro /your/capsule/dir
ro $HOME

# /tmp for UNIX sockets if using socat bridge mode (Method 2)
rw /tmp

# ── Syscalls: block everything dangerous that urtb doesn't use ──
# Profiled with: syscall.py profile -- urtb connect --exec "urtb listen ..."
# Result: 0 dangerous syscalls needed out of 50 checked.
# Self-contained (no inherit) — tighter than ai-agent ($HOME read-only).
block ptrace
block mount
block umount2
block reboot
block kexec_load
block kexec_file_load
block init_module
block finit_module
block delete_module
block pivot_root
block chroot
block unshare
block setns
block keyctl
block add_key
block request_key
block bpf
block userfaultfd
block perf_event_open
block process_vm_readv
block process_vm_writev
block acct
block swapon
block swapoff
block settimeofday
block clock_settime
block clock_adjtime
block adjtimex
block io_uring_setup
block io_uring_enter
block io_uring_register
block open_by_handle_at
block name_to_handle_at
block open_tree
block move_mount
block fsopen
block fsmount
block fsconfig
block fspick
block mount_setattr
block pidfd_getfd
block ioperm
block iopl
block nfsservctl
block quotactl
block personality
block lookup_dcookie
block mbind
block move_pages
block vhangup

# ── Environment: strip injection vectors and credential leakage ──
env-deny LD_PRELOAD
env-deny LD_LIBRARY_PATH
env-deny LD_AUDIT
env-deny GCONV_PATH
env-deny BASH_ENV
env-deny NODE_OPTIONS
env-deny SSH_AUTH_SOCK
env-deny AWS_ACCESS_KEY_ID
env-deny AWS_SECRET_ACCESS_KEY
env-deny AWS_SESSION_TOKEN
env-deny GITHUB_TOKEN
env-deny GH_TOKEN
env-deny DATABASE_URL
env-deny PGPASSWORD
env-deny MYSQL_PWD

# ── Features ──
landlock on
seccomp on
no-new-privs on
env-sanitize on
