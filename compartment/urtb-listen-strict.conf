# urtb-listen-strict.conf — Strict allow-list profile for urtb listen
#
# Same threat model as urtb-listen.conf (hostile radio peers, rogue
# clients, compromised capsule holders), but uses an allow-list:
# ONLY the observed syscalls are permitted. Everything else returns EPERM.
#
# Higher security than deny-list, but the spawned shell may hit rare
# syscalls not captured during profiling. Test with your actual shell
# workload before deploying.
#
# Profiled with:
#   syscall.py profile --seccomp-mode allow --duration 6 -- \
#       urtb connect --exec "urtb listen --transport stdio --otp ..."
#
# Also profiled with OTP: TOTP uses glibc vDSO (not a syscall),
# no extra allow entries needed.
#
# Usage:
#   compartment-user --profile compartment/urtb-listen-strict.conf -- \
#       urtb listen --transport unix --socket /tmp/urtb.sock \
#           --capsule cap.cap --loop --otp otp.key

# ── Filesystem ──
# System libs: read-only. $HOME: read-write (shell needs it).
ro /usr
ro /lib
ro /lib64
ro /etc
ro /run
ro /proc
ro /sys
rw /dev
# rwx: shell needs write + execute in $HOME (W^X — 'rw' blocks exec)
rwx $HOME
rw /tmp

# ── Syscalls: allow-list (only what was observed) ──
seccomp-mode allowlist

allow 0    # read
allow 1    # write
allow 3    # close
allow 5    # fstat
allow 7    # poll
allow 8    # lseek
allow 28   # madvise (MADV_DONTDUMP — PSK memory protection)
allow 9    # mmap
allow 10   # mprotect
allow 11   # munmap
allow 12   # brk
allow 13   # rt_sigaction
allow 14   # rt_sigprocmask
allow 15   # rt_sigreturn
allow 16   # ioctl
allow 17   # pread64
allow 21   # access
allow 32   # dup
allow 33   # dup2
allow 39   # getpid
allow 41   # socket
allow 42   # connect
allow 52   # getpeername
allow 53   # socketpair
allow 56   # clone
allow 59   # execve
allow 61   # wait4
allow 62   # kill
allow 63   # uname
allow 72   # fcntl
allow 80   # chdir
allow 102  # getuid
allow 104  # getgid
allow 107  # geteuid
allow 108  # getegid
allow 109  # setpgid
allow 110  # getppid
allow 111  # getpgrp
allow 112  # setsid
allow 115  # getgroups
allow 122  # setfsuid
allow 123  # setfsgid
allow 130  # rt_sigsuspend
allow 149  # mlock
allow 150  # munlock
allow 158  # arch_prctl
allow 202  # futex
allow 217  # getdents64
allow 218  # set_tid_address
allow 222  # timer_create
allow 223  # timer_settime
allow 226  # timer_delete
allow 230  # clock_nanosleep
allow 231  # exit_group
allow 257  # openat
allow 262  # newfstatat
allow 270  # pselect6
allow 273  # set_robust_list
allow 293  # pipe2
allow 302  # prlimit64
allow 318  # getrandom
allow 334  # rseq
allow 439  # faccessat2

# ── Environment ──
env-deny LD_PRELOAD
env-deny LD_LIBRARY_PATH
env-deny LD_AUDIT
env-deny GCONV_PATH
env-deny BASH_ENV
env-deny NODE_OPTIONS
env-deny AWS_ACCESS_KEY_ID
env-deny AWS_SECRET_ACCESS_KEY
env-deny AWS_SESSION_TOKEN
env-deny GITHUB_TOKEN
env-deny GH_TOKEN
env-deny DATABASE_URL
env-deny PGPASSWORD
env-deny MYSQL_PWD

# ── Features ──
landlock on
seccomp on
no-new-privs on
env-sanitize on
