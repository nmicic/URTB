; URTB Phase B firmware - Heltec WiFi LoRa 32 V3
; Built per references/heltec_v3_hardware.md.
; URTB firmware: setup-only boot OLED display. No I²C traffic from
; loop() — runtime redraw is forbidden by design
; (see firmware/src/display.cpp safety comment).

; Common base env: shared platform / board / lib_deps / version flags. Has
; NO URTB_TEST_INJECT define so the prod and test envs can each set it
; without a command-line redefinition warning.
[env]
platform      = espressif32
board         = heltec_wifi_lora_32_V3
framework     = arduino
monitor_speed = 115200

lib_deps =
    jgromes/RadioLib@^6.6.0
    olikraus/U8g2@^2.35

extra_scripts = pre:extra_scripts/git_sha.py

build_flags =
    -DRADIOLIB_DEBUG=0
    -DRADIOLIB_VERBOSE=0
    -DURTB_FW_VERSION_MAJOR=0
    -DURTB_FW_VERSION_MINOR=1
    -DURTB_FW_VERSION_PATCH=0

; Production firmware. URTB_TEST_INJECT=0: every #if URTB_TEST_INJECT block
; in firmware/src/main.cpp is removed at preprocess time, leaving zero
; test-only code in the image.
[env:heltec_wifi_lora_32_V3]
build_flags =
    ${env.build_flags}
    -DURTB_TEST_INJECT=0

; Test-only build with programmable RF failure injection enabled. Adds the
; USB_TEST_INJECT (0x0B) handler and the per-bit DROP_*/LOW_POWER gates
; inside esp_now_send / on_espnow_recv / radio.transmit / pump_lora_rx /
; radio.setOutputPower. Flash this image when running AC-05-03/04/05/08/09
; and AC-09-01 with the host-side `urtb test-inject` subcommand.
[env:heltec_wifi_lora_32_V3_test]
build_flags =
    ${env.build_flags}
    -DURTB_TEST_INJECT=1
